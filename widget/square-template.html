<!DOCTYPE html>
<!--
  Squarespace Simulation Template for CosAm Calendar Widget Testing

  This template approximates the styling environment of the Cosplay America
  Squarespace site so the calendar widget can be tested in a realistic context.
  It is NOT a copy of the live site — just enough CSS/layout to catch styling
  conflicts and verify visual appearance.
-->
<html lang="en-US">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{TITLE} — Cosplay America // Test</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,400;0,500;0,700;1,400;1,700&family=Fjalla+One:ital,wght@0,400">
  <style>
    /* Squarespace Bedford-family base resets */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Libre Franklin', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      font-weight: 400;
      line-height: 1.8em;
      color: #1a1a1a;
      background-color: #40c8ed !important;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: 'acumin-pro-extra-condensed', 'Fjalla One', Helvetica, Arial, sans-serif;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.0em;
      line-height: 1.2em;
    }

    h1 {
      font-size: 60px;
      font-weight: 700;
      text-align: center;
      margin: 0 0 15px 0;
    }

    a {
      color: #1a1a1a;
    }

    a:hover {
      opacity: 0.7;
    }

    /* Site border (Bedford tweak) */
    .Site {
      border: 4px solid #1a1a1a;
      min-height: 100vh;
    }

    /* Header with navigation */
    .Header {
      position: relative;
      z-index: 1000;
      /* neutral background */
    }

    /* Navigation overlay */
    .Header-nav {
      position: relative;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1001;
      background: #d4c5b9;
      padding: 78px 40px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      font-family: 'Fjalla One', Helvetica, Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 13px;
    }

    .Header-nav a {
      text-decoration: none;
      padding: 5px 0;
    }

    /* Main content area — where the widget lives */
    .Main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 20px 40px 40px;
    }

    .Main-content {
      width: 100%;
    }

    /* Spacer blocks */
    .spacer-block {
      height: 86px;
    }

    /* Footer */
    .Footer {
      border-top: 1px solid #e0e0e0;
      padding: 40px;
      text-align: center;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>

<body>
  <div class="Site">
    <!-- Simplified header -->
    <header class="Header">
      <nav class="Header-nav">
        <a href="#">Home</a>
        <a href="#">Register</a>
        <a href="#">Location</a>
        <a href="#">Guests</a>
        <a href="#">Programming</a>
        <a href="#">Schedule</a>
        <a href="#">Policies &amp; FAQ</a>
        <a href="#">Contact</a>
      </nav>

      <!-- Main content -->
      <main class="Main">
        <section class="Main-content">
          <div class="spacer-block"></div>
          <h1 class="page-title">Programming Schedule</h1>
          <div class="spacer-block"></div>
          <div class="sqs-block-code">
            <div class="sqs-block-content">
              {WIDGET_BLOCK}
            </div>
          </div>
        </section>
      </main>

      <!-- Footer -->
      <footer class="Footer">
        <p>Cosplay America — Test Template</p>
        <p>This is a local test page, not the live site.</p>
      </footer>
  </div>
</body>

</html>
