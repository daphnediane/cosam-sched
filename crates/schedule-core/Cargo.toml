[package]
name = "schedule-core"
version = "0.1.0"
edition = "2024"
description = "Shared schedule data and conversion logic for Cosplay America"
license = "BSD-2-Clause"

[lib]
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1"
regex = "1"
umya-spreadsheet = "2"

[dev-dependencies]
serde_json = "1"
