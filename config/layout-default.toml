# Layout defaults configuration
# Copy to config/layout.toml (gitignored) to customize layout defaults.
# This file is embedded in cosam-convert and serves as the default configuration.
#
# Every job is a configuration of the unified layout builder (one multi-section
# document per job). The legacy `format` key is no longer recognized.
#
# Paper keys:   letter, legal, tabloid, super_b, poster, postcard
# Content keys: both (grid + descriptions), grid_only, description_only, panel_list
# Split keys:   none, day, half_day, room, room_day, presenter, presenter_day
# Orientations: portrait, landscape
#
# Per-job optional keys:
#   panel_filter = "all"        # "all" (default), "workshops", "premium"
#   color_mode   = "color"      # "color" (default) or "bw"
#   footer       = "full"       # "full" (default), "timestamp_only", "none"
#   double_sided = false        # pad each section onto an odd page
#   header_text  = "..."        # left label (1-D split) / right label (split=none)
#   columns      = 4            # override the content/paper default column count
#   base_font_pt = "12pt"       # override base font size (descriptions, etc.)
#   grid_font_pt = "8pt"        # override grid event text size
#
# `room`/`room_day` highlight the room column; `presenter`/`presenter_day`
# highlight that guest's own cells in the day grid.
# Grid-bearing content (both/grid_only) requires a time split; `room`/`presenter`
# without an explicit day component default to `day`.

# Schedule grids (former "schedule"): grid only, split per half-day.
[[jobs]]
content = "grid_only"
split = "half_day"
paper = "tabloid"
orientation = "landscape"
stem = "schedule"

# Workshops listing (former "workshops_listing"): descriptions, no split, workshop-only.
[[jobs]]
content = "description_only"
split = "none"
panel_filter = "workshops"
header_text = "Workshops"
paper = "tabloid"
orientation = "landscape"
stem = "workshops"

[[jobs]]
content = "description_only"
split = "none"
panel_filter = "workshops"
header_text = "Workshops"
paper = "poster"
orientation = "landscape"
stem = "workshops"

# Room signs (former "room_signs"): full day grid with the room column highlighted
# plus that room's descriptions, one section per room per day.
[[jobs]]
content = "both"
split = "room_day"
paper = "tabloid"
orientation = "landscape"
stem = "room-signs"

# Guest cards (former "guest_postcards"): compact panel list, one section per guest.
[[jobs]]
content = "panel_list"
split = "presenter"
paper = "postcard"
orientation = "portrait"
columns = 1
stem = "postcards"

# Panel descriptions (former "descriptions"): description only, page break per day.
[[jobs]]
content = "description_only"
split = "day"
paper = "tabloid"
orientation = "landscape"
stem = "desc"

[[jobs]]
content = "description_only"
split = "day"
paper = "letter"
orientation = "portrait"
stem = "desc"

[[jobs]]
content = "description_only"
split = "day"
paper = "legal"
orientation = "portrait"
stem = "desc"

[[jobs]]
content = "description_only"
split = "day"
paper = "poster"
orientation = "landscape"
stem = "desc"
# base_font_pt = "12.0pt"  # Override default font size for poster descriptions

# Flyer: grid + descriptions per day, double-sided (each day starts on an odd page).
[[jobs]]
content = "both"
split = "day"
double_sided = true
paper = "letter"
orientation = "landscape"
stem = "flyer"

[[jobs]]
content = "both"
split = "day"
double_sided = true
paper = "legal"
orientation = "landscape"
stem = "flyer"
