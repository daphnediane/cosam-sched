# Layout defaults configuration
# This file is embedded in cosam-convert and serves as the default configuration.
#
# Every job is a configuration of the unified layout builder (one multi-section
# document per job). The legacy `format` key is no longer recognized.
#
# Paper keys:        letter, legal, tabloid, super_b, poster, postcard
# Content keys:      both (grid + descriptions), grid_only, description_only, panel_list
# Section split keys: none (default), room, presenter
# Time split keys:   none (default), day, half_day, timeline (split on SPLIT/timeline entries)
# Orientations:      portrait, landscape
#
# Note: the old combined `split` key (none, day, half_day, room, room_day,
#       presenter, presenter_day) is still accepted as a deprecated alias.
#
# Per-job optional keys:
#   panel_filter   = "all"      # "all" (default), "workshops", "premium"
#   include_private = false     # true = private view: private panels + unlisted
#                               # presenters in per-presenter splits (bylines stay
#                               # credited-only). Default false (public view).
#   color_mode     = "color"    # "color" (default) or "bw"
#   footer         = "full"     # "full" (default), "timestamp_only", "none"
#   double_sided   = false      # pad each section onto an odd page
#   header_text    = "..."      # left label (section split) / right label (no split)
#   columns        = 4          # override the content/paper default column count
#   base_font_pt   = "12pt"     # override base font size (descriptions, etc.)
#   grid_font_pt   = "8pt"      # override grid event text size
#   logo           = "brand"    # logo alias/filename from [logos]; "none" suppresses logo
#   banner_text_pt = "18pt"     # override banner text size (default: 28pt)
#   fit_grid       = true       # fit a full-page grid onto one page (compress +
#                               #   condense text). Default: on for grid_only, off otherwise.
#   micro          = "..."      # micro font family for small text (overrides brand);
#                               #   "none" disables the small-size substitution for this job
#   micro_max_pt   = 8.0        # size (pt) below which text switches to the micro font
#
# Style keys (colors accept hex "#f2f2f2", "luma(95%)", or names like "white"):
#   page_fill       = "luma(95%)"  # page background tint (default: white)
#   empty_grid_fill = "white"      # empty grid-cell fill
#   cards           = true         # description panels as bordered cards
#   card_fill       = "white"      # card background when cards = true
#   column_gap      = "0.25in"     # gutter between body-text columns
#   card_gap        = "column"     # gap between cards ("column" = column_gap)
#
# Preset and Import System:
#   Presets are reusable configuration blocks defined with [presets.name].
#   Jobs and other presets can import them using import = ["preset1", "preset2"].
#   Later imports override earlier ones; job settings override all imports.
#
#   Custom Brand Per Job:
#   brand_config = "path/to/brand.toml"  # Use different branding for this job

# ─────────────────────────────────────────────────────────────────────────────
# Preset Definitions
# ─────────────────────────────────────────────────────────────────────────────

# Workshop preset: descriptions only, workshops filter, no split
[presets.workshops]
content = "description_only"
panel_filter = "workshops"
header_text = "Workshops"

# Card style preset: bordered panels with tinted page background
[presets.card_style]
cards = true
page_fill = "luma(95%)"
card_fill = "white"

# Flyer preset: both content (grid + descriptions), day split, double-sided
[presets.flyer]
content = "both"
time_split = "day"
double_sided = true
orientation = "landscape"

# Tabloid landscape preset for large format output
[presets.tabloid_landscape]
paper = "tabloid"
orientation = "landscape"

# Poster landscape preset for wall mounting
[presets.poster_landscape]
paper = "poster"
orientation = "landscape"

# Minimal footer preset (timestamp only)
[presets.minimal_footer]
footer = "timestamp_only"

# ─────────────────────────────────────────────────────────────────────────────
# Schedule Jobs
# ─────────────────────────────────────────────────────────────────────────────

# Schedule grids: grid only, split per half-day, tabloid portrait
[[jobs]]
content = "grid_only"
time_split = "half_day"
paper = "tabloid"
orientation = "portrait"
stem = "schedule"

# ─────────────────────────────────────────────────────────────────────────────
# Workshop Jobs
# ─────────────────────────────────────────────────────────────────────────────

# Workshops listing: tabloid landscape
[[jobs]]
import = ["workshops", "tabloid_landscape"]
stem = "workshops"

# Workshops listing: poster size
[[jobs]]
import = ["workshops", "poster_landscape"]
stem = "workshops"

# ─────────────────────────────────────────────────────────────────────────────
# Room Sign Jobs
# ─────────────────────────────────────────────────────────────────────────────

# Room signs: full day grid (room column highlighted) + that room's descriptions
[[jobs]]
import = ["card_style", "minimal_footer"]
content = "both"
section_split = "room"
time_split = "day"
paper = "tabloid"
orientation = "landscape"
stem = "room-signs"
card_fill = "luma(95%)"
columns = 5

# ─────────────────────────────────────────────────────────────────────────────
# Guest Card Jobs
# ─────────────────────────────────────────────────────────────────────────────

# Guest cards: compact panel list, one section per guest.
# Private view so a guest's personal schedule includes panels where they are
# unlisted/uncredited (bylines still show credited presenters only).
[[jobs]]
content = "panel_list"
section_split = "presenter"
paper = "postcard"
orientation = "portrait"
columns = 1
stem = "postcards"
footer = "timestamp_only"
logo = "small"
include_private = true

# ─────────────────────────────────────────────────────────────────────────────
# Description Jobs
# ─────────────────────────────────────────────────────────────────────────────

# Panel descriptions: tabloid landscape with card style
[[jobs]]
import = ["card_style"]
content = "description_only"
time_split = "day"
paper = "tabloid"
orientation = "landscape"
stem = "desc"

# Panel descriptions: letter portrait
[[jobs]]
import = ["card_style"]
content = "description_only"
time_split = "day"
paper = "letter"
orientation = "portrait"
stem = "desc"

# Panel descriptions: legal portrait
[[jobs]]
import = ["card_style"]
content = "description_only"
time_split = "day"
paper = "legal"
orientation = "portrait"
stem = "desc"

# Panel descriptions: poster landscape with minimal footer
[[jobs]]
import = ["card_style", "minimal_footer"]
content = "description_only"
time_split = "day"
paper = "poster"
orientation = "landscape"
stem = "desc"

# ─────────────────────────────────────────────────────────────────────────────
# Flyer Jobs
# ─────────────────────────────────────────────────────────────────────────────

# Flyer: letter size, double-sided
[[jobs]]
import = ["flyer"]
paper = "letter"
stem = "flyer"

# Flyer: legal size, double-sided
[[jobs]]
import = ["flyer"]
paper = "legal"
stem = "flyer"
