# Brand configuration sample for cosam-convert layout output.
# Copy to config/brand.toml and customize. brand.toml is gitignored.

[meta]
# name = "Cosplay America"
# site_url = "https://cosplayamerica.com"

# ── Logos ──────────────────────────────────────────────────────────────────
# Named logo aliases.  Each value is a filename within logo_dir.
# logo_dir defaults to the first of "brand/logos" or "brand/logo" that exists
# next to this file; set it explicitly to override.
#
# The "brand" alias is the default logo used when a job does not specify `logo`.
# Add as many aliases as you like; layout jobs reference them by name.
#
# [logos]
# logo_dir = "brand/logo"          # relative to this file (auto-detected if absent)
# brand    = "logo-white.svg"      # used when job sets logo = "brand" (the default)
# small    = "logo-small.svg"      # used when job sets logo = "small"

[colors]
# Primary accent color
primary = "#00BCDD"
# Text black
black = "#000000"
# Dark background / header color
dark_grey = "#18191C"
# White
white = "#FFFFFF"

[fonts]
# heading = "Trend Sans"
# heading_style = "One"        # Optional: style name (e.g., "One", "Bold", "Italic")
# heading_weight = "200"       # Optional: weight (e.g., "200"=One, "300"=Two, "400"=Three, "500"=Four, "700"=Five)
# heading_idml_style = "One"   # Optional: exact InDesign style name for IDML export (overrides the
#                              #   numeric-weight mapping; Typst/PDF keeps using heading_weight)
# banner = "Trend Sans"        # Optional: page-header bar font; falls back to heading
# banner_style = "One"         # Optional: banner font style; falls back to heading_style
# banner_weight = "200"        # Optional: banner font weight; falls back to heading_weight, then "bold"
# subheading = "Bebas Neue"
# body = "Avenir Next"
# body_style = "Regular"       # Optional: style name (e.g., "Regular", "Medium")
# body_weight = "400"          # Optional: weight (e.g., "400"=Regular, "700"=Bold)
# body_idml_style = "Regular"  # Optional: exact InDesign style name for IDML export (overrides the
#                              #   numeric-weight mapping; Typst/PDF keeps using body_weight)
# font_dir = "brand/fonts"     # directory with TTF/OTF files, relative to this file
#
# ── Micro font (small-size substitute) ───────────────────────────────────────
# A typeface designed to stay legible at small point sizes. When set, any text
# rendered below `micro_max_pt` (default 8pt) automatically switches to this
# family, preserving the surrounding weight/style. Typst/PDF output only.
# micro = "FreightMicro Pro"
# micro_max_pt = 8.0           # Optional: threshold in points (default 8)
# micro_style = "..."          # Optional: usually omit so the text's style is kept
# micro_weight = "..."         # Optional: usually omit so the text's weight is kept
#
# ── Web-equivalent fonts (widget print) ──────────────────────────────────────
# The print/IDML fonts above are not available in a browser, so each role may
# declare a web substitute the widget's print formats use. `{role}_web` is the
# CSS family; `{role}_web_weight`/`{role}_web_style` refine it; `{role}_web_google`
# is a Google Fonts stylesheet URL the print window loads via <link>. Banner
# falls back to the heading web font. These have no effect on Typst/IDML output.
# heading_web = "Montserrat"          # e.g. a web stand-in for Trend Sans One
# heading_web_weight = "600"
# heading_web_google = "https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap"
# subheading_web = "Bebas Neue"
# body_web = "Nunito Sans"
