# Brand configuration sample for cosam-layout.
# Copy to config/brand.toml and customize. brand.toml is gitignored.

[meta]
# name = "Cosplay America"
# site_url = "https://cosplayamerica.com"
# logo_path = "brand/logo.png"   # relative to this file

[colors]
# Primary accent color
primary = "#00BCDD"
# Text black
black = "#000000"
# Dark background / header color
dark_grey = "#18191C"
# White
white = "#FFFFFF"

[fonts]
# heading = "Trend Sans"
# heading_style = "One"        # Optional: style name (e.g., "One", "Bold", "Italic")
# heading_weight = "200"       # Optional: weight (e.g., "200"=One, "300"=Two, "400"=Three, "500"=Four, "700"=Five)
# banner = "Trend Sans"        # Optional: page-header bar font; falls back to heading
# banner_style = "One"         # Optional: banner font style; falls back to heading_style
# banner_weight = "200"        # Optional: banner font weight; falls back to heading_weight, then "bold"
# subheading = "Bebas Neue"
# body = "Avenir Next"
# body_style = "Regular"       # Optional: style name (e.g., "Regular", "Medium")
# body_weight = "400"          # Optional: weight (e.g., "400"=Regular, "700"=Bold)
# font_dir = "brand/fonts"     # directory with TTF/OTF files, relative to this file
